<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Base dark background with slight radial glow -->
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0e1b30"/>
      <stop offset="100%" stop-color="#040810"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Rounded corner container for web app icon look -->
  <rect width="512" height="512" rx="112" fill="url(#bgGlow)"/>
  
  <!-- Cyber circuitry background detailing -->
  <g opacity="0.15" stroke="#00cfff" stroke-width="2" fill="none">
    <path d="M50 120 h80 l30 30 v100"/>
    <path d="M462 392 h-80 l-30 -30 v-100"/>
    <circle cx="160" cy="250" r="4" fill="#00cfff"/>
    <circle cx="352" cy="262" r="4" fill="#00cfff"/>
  </g>
  
  <g transform="translate(256, 256)" filter="url(#glow)">
    <!-- Outer Hexagon -->
    <polygon points="0,-160 138,-80 138,80 0,160 -138,80 -138,-80" fill="none" stroke="#ff9a00" stroke-width="12" stroke-linejoin="round"/>
    <polygon points="0,-140 121,-70 121,70 0,140 -121,70 -121,-70" fill="#050d1a" stroke="#a03000" stroke-width="4" stroke-linejoin="round" opacity="0.6"/>
    
    <!-- Inner Warning Triangle -->
    <polygon points="0,-85 68,35 -68,35" fill="none" stroke="#ffbb44" stroke-width="12" stroke-linejoin="round"/>
    
    <!-- Exclamation point inside warning triangle -->
    <rect x="-6" y="-30" width="12" height="38" rx="4" fill="#ffbb44"/>
    <circle cx="0" cy="22" r="7" fill="#ffbb44"/>
    
    <!-- Radials/ticks around hex -->
    <circle cx="0" cy="0" r="190" fill="none" stroke="#00cfff" stroke-width="2" opacity="0.3" stroke-dasharray="10 15"/>
  </g>
</svg>
