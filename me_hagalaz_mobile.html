<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Hagalaz</title>
<meta name="description" content="Digitální karty pro Mass Effect: Priority Hagalaz — karty tlaku a chování nepřátel.">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.png">
<style>
/* ═══════════════════════════════════════════════════
   RESET, VARIABLES & UTILITIES
   ═══════════════════════════════════════════════════ */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

:root {
  color-scheme: dark;
  --W-full: 2.5in; /* 240px */
  --H-full: 3.5in; /* 336px */
  --R: 8px;
  
  /* Cyber Theme Colors */
  --bg: #040810;
  --card-bg: #050d1a;
  --ce: #e84800; --ce-dk: #5c1c00; --ce-md: #a03000;
  --re: #7722cc; --re-dk: #2e0e5a; --re-md: #5018a0;
  --pr: #ff9a00; --pr-dk: #4e2800; --pr-md: #944800;
  --ax: #00cfff;
  --tx: #b8d4f0; --tx-hi: #e0f2ff; --tx-dm: #3a5a78;
  --border-dim: rgba(255, 255, 255, 0.06);
}

html {
  height: 100%;
}

body {
  background-color: var(--bg);
  background-image: 
    radial-gradient(at 50% 30%, rgba(10, 24, 40, 0.6) 0%, rgba(4, 8, 16, 1) 100%),
    linear-gradient(rgba(0, 207, 255, 0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 207, 255, 0.02) 1px, transparent 1px);
  background-size: 100% 100%, 25px 25px, 25px 25px;
  color: var(--tx);
  font-family: 'Rajdhani', -apple-system, BlinkMacSystemFont, sans-serif;
  height: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}

/* ═══════════════════════════════════════════════════
   APP HEADER
   ═══════════════════════════════════════════════════ */
.app-header {
  height: 52px;
  background: rgba(5, 13, 26, 0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(0, 207, 255, 0.2);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 16px;
  padding-top: env(safe-area-inset-top);
  box-sizing: content-box;
  flex-shrink: 0;
  z-index: 100;
}

.app-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.95rem;
  font-weight: 900;
  letter-spacing: 2px;
  color: var(--ax);
  text-shadow: 0 0 12px rgba(0, 207, 255, 0.4);
  display: flex;
  align-items: center;
  gap: 6px;
}

.app-title::before {
  content: '⬢';
  font-size: 0.75rem;
  color: var(--pr);
}

.header-actions {
  display: flex;
  gap: 8px;
}

.icon-btn {
  background: rgba(0, 207, 255, 0.05);
  border: 1px solid rgba(0, 207, 255, 0.25);
  color: var(--tx);
  border-radius: 6px;
  width: 34px;
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s ease;
}

.icon-btn:active {
  background: rgba(0, 207, 255, 0.2);
  transform: scale(0.92);
}

.icon-btn.muted {
  border-color: rgba(255, 255, 255, 0.15);
  color: var(--tx-dm);
  background: transparent;
}

/* ═══════════════════════════════════════════════════
   SCREENS & TABS
   ═══════════════════════════════════════════════════ */
.app-content {
  flex: 1;
  position: relative;
  overflow: hidden;
}

.tab-panel {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  opacity: 0;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  transition: opacity 0.25s ease, transform 0.25s ease;
  transform: translateY(10px);
}

.tab-panel.active {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0);
}

/* ═══════════════════════════════════════════════════
   TAB 1: PRESSURE CARDS
   ═══════════════════════════════════════════════════ */
#tab-pressure {
  padding: 16px;
  justify-content: space-between;
  align-items: center;
}

.deck-status-bar {
  width: 100%;
  max-width: 320px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.deck-status-text {
  display: flex;
  justify-content: space-between;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.7rem;
  letter-spacing: 1.5px;
  color: var(--tx-dm);
}

.deck-status-text span {
  color: var(--pr);
  font-weight: 700;
}

.progress-track {
  width: 100%;
  height: 4px;
  background: rgba(255, 255, 255, 0.05);
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  width: 100%;
  background: linear-gradient(90deg, var(--pr-md), var(--pr));
  box-shadow: 0 0 8px var(--pr);
  transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.pressure-card-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  perspective: 1200px;
  padding: 12px 0;
}

.pressure-scale-wrapper {
  width: 240px;
  height: 336px;
  position: relative;
  transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
  transform-style: preserve-3d;
}

.pressure-scale-wrapper .card.drawing {
  animation: drawCardAnim 0.45s cubic-bezier(0.25, 1, 0.5, 1);
}

@keyframes drawCardAnim {
  0% {
    transform: translateY(60px) rotateX(25deg) scale(0.9);
    opacity: 0.2;
  }
  100% {
    transform: translateY(0) rotateX(0deg) scale(1);
    opacity: 1;
  }
}

.pressure-scale-wrapper .card {
  position: absolute;
  top: 0;
  left: 0;
}

.draw-btn-container {
  width: 100%;
  max-width: 320px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

.draw-btn {
  width: 100%;
  height: 52px;
  background: linear-gradient(135deg, rgba(255, 154, 0, 0.1), rgba(148, 72, 0, 0.3));
  border: 1.5px solid var(--pr);
  border-radius: 8px;
  color: #fff;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.88rem;
  font-weight: 900;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 0 15px rgba(255, 154, 0, 0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  text-transform: uppercase;
}

.draw-btn:active {
  transform: scale(0.96);
  background: linear-gradient(135deg, rgba(255, 154, 0, 0.2), rgba(148, 72, 0, 0.45));
  box-shadow: 0 0 25px rgba(255, 154, 0, 0.35);
  border-color: #ffb83d;
}

.history-container {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.history-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.65rem;
  letter-spacing: 1px;
  color: var(--tx-dm);
  text-transform: uppercase;
  text-align: left;
}

.history-list {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding: 2px 0;
  width: 100%;
  scrollbar-width: none;
}

.history-list::-webkit-scrollbar {
  display: none;
}

.history-item {
  background: rgba(255, 154, 0, 0.05);
  border: 1px solid rgba(255, 154, 0, 0.25);
  border-radius: 4px;
  padding: 5px 10px;
  font-size: 0.72rem;
  font-weight: 600;
  white-space: nowrap;
  cursor: pointer;
  color: var(--tx);
  transition: all 0.2s ease;
}

.history-item:active {
  background: rgba(255, 154, 0, 0.15);
  border-color: var(--pr);
}

/* ═══════════════════════════════════════════════════
   TAB 2: ENEMY BEHAVIORS
   ═══════════════════════════════════════════════════ */
#tab-enemies {
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.grid-container {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  padding: 16px;
  width: 100%;
  box-sizing: border-box;
}

.grid-item {
  width: 100%;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border-radius: var(--R);
  transition: transform 0.2s ease;
}

.grid-item:active {
  transform: scale(0.97);
}

.card-scale-wrapper {
  width: 240px;
  height: 336px;
  position: absolute;
  top: 0;
  left: 0;
  transform-origin: top left;
  pointer-events: none; /* Let parent handle clicks */
}

/* ═══════════════════════════════════════════════════
   ZOOM OVERLAY
   ═══════════════════════════════════════════════════ */
#zoom-overlay {
  position: fixed;
  top: 0;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(4, 8, 16, 0.92);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  z-index: 1000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
}

#zoom-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

.zoom-card-container {
  position: relative;
  width: 240px;
  height: 336px;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  transform: scale(0.85);
}

#zoom-overlay.active .zoom-card-container {
  transform: scale(1);
}

.zoom-card-container .card {
  position: absolute;
  top: 0;
  left: 0;
  transform-origin: top left;
  transform: scale(var(--zoom-scale, 1.25));
}

.zoom-close-btn {
  margin-top: 48px;
  padding: 10px 24px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.25);
  color: var(--tx-hi);
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.75rem;
  letter-spacing: 2px;
  font-weight: 700;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s ease;
  text-transform: uppercase;
}

.zoom-close-btn:active {
  background: rgba(255, 255, 255, 0.15);
  transform: scale(0.95);
}

/* ═══════════════════════════════════════════════════
   APP NAVIGATION BAR
   ═══════════════════════════════════════════════════ */
.app-nav {
  height: 56px;
  background: rgba(5, 13, 26, 0.9);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border-top: 1px solid rgba(0, 207, 255, 0.2);
  display: flex;
  flex-shrink: 0;
  padding-bottom: env(safe-area-inset-bottom);
  box-sizing: content-box;
  z-index: 100;
}

.nav-tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: transparent;
  border: none;
  color: var(--tx-dm);
  cursor: pointer;
  transition: all 0.25s ease;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.65rem;
  font-weight: 900;
  letter-spacing: 1px;
  gap: 4px;
}

.nav-tab.active {
  color: var(--ax);
  text-shadow: 0 0 10px rgba(0, 207, 255, 0.35);
}

.nav-tab svg {
  width: 20px;
  height: 20px;
  fill: currentColor;
  transition: transform 0.2s ease;
}

.nav-tab.active svg {
  transform: translateY(-2px);
  filter: drop-shadow(0 0 6px rgba(0, 207, 255, 0.6));
}

/* ═══════════════════════════════════════════════════
   TOAST NOTIFICATION
   ═══════════════════════════════════════════════════ */
.toast-msg {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, calc(-50% - 20px));
  background: rgba(0, 207, 255, 0.95);
  color: #040810;
  padding: 12px 24px;
  border-radius: 6px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 1.15rem;
  font-weight: 900;
  letter-spacing: 2px;
  box-shadow: 0 0 25px rgba(0, 207, 255, 0.6);
  opacity: 0;
  pointer-events: none;
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  z-index: 110;
}

.toast-msg.active {
  opacity: 1;
  transform: translate(-50%, -50%);
}

/* ═══════════════════════════════════════════════════
   CARD ORIGINAL ENGINE STYLES (Copied from Print layout)
   ═══════════════════════════════════════════════════ */
.card {
  width: var(--W-full);
  height: var(--H-full);
  border-radius: var(--R);
  overflow: hidden;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  position: absolute;
  font-size: 11.8pt;
  top: 0;
  left: 0;
}

/* ═══════════════════════════════════════════════════
   BEHAVIOR CARD FRONT
   ═══════════════════════════════════════════════════ */
.beh{background:var(--card-bg)}
.beh.ce{border:1.5px solid var(--ce-dk)}
.beh.re{border:1.5px solid var(--re-dk)}

.beh-hdr{
  height:.3in;display:flex;align-items:center;
  padding:0 .09in;gap:5px;flex-shrink:0;
}
.ce .beh-hdr{
  background:linear-gradient(90deg,#6e1e00,#2a0c00);
  border-bottom:1.5px solid var(--ce);
}
.re .beh-hdr{
  background:linear-gradient(90deg,#340e78,#150632);
  border-bottom:1.5px solid var(--re);
}
.hdr-faction{
  font-family:'Rajdhani',sans-serif;font-size:.66em;font-weight:900;
  letter-spacing:.12em;text-transform:uppercase;
}
.ce .hdr-faction{color:#ff9966}
.re .hdr-faction{color:#bb88ff}
.hdr-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(255,255,255,.14),transparent)}
.hdr-pips{display:flex;gap:2px}
.pip{width:4px;height:4px;border-radius:50%;opacity:.55}
.ce .pip{background:var(--ce)}
.re .pip{background:var(--re)}

.beh-art{flex-shrink:0;height:1.04in;overflow:hidden}
.beh-art svg{width:100%;height:100%;display:block}

.beh-nm{padding:.044in .09in .028in;border-bottom:1px solid var(--border-dim);flex-shrink:0;display:flex;flex-direction:row;align-items:center;justify-content:space-between;gap:4px}
.beh-title{
  font-family:'Rajdhani',sans-serif;font-size:.98em;font-weight:900;
  letter-spacing:.03em;text-transform:uppercase;line-height:1.1;
}
.ce .beh-title{color:#fff0eb}
.re .beh-title{color:#f5eeff}
.beh-cat{font-size:.70em;font-weight:600;letter-spacing:.16em;text-transform:uppercase;margin-top:1px;opacity:.5}
.beh-keyword{
  display:inline-block;font-family:'Rajdhani',sans-serif;font-size:.62em;
  font-weight:900;letter-spacing:.07em;text-transform:uppercase;
  border:1.5px solid currentColor;padding:1px 5px;border-radius:2px;
  flex-shrink:0;white-space:nowrap;opacity:.9;
}
.ce .beh-keyword{color:#ff9966;border-color:#e84800}
.re .beh-keyword{color:#cc99ff;border-color:#7722cc}

.beh-pris{flex:1;padding:.04in .08in .03in;display:flex;flex-direction:column;gap:.022in;overflow:hidden}
.pri-row{display:flex;gap:.04in;align-items:flex-start}
.pri-num{
  font-family:'Rajdhani',sans-serif;font-size:.64em;font-weight:900;
  min-width:.2in;height:.2in;display:flex;align-items:center;justify-content:center;
  border-radius:2px;flex-shrink:0;margin-top:.005in;line-height:1;
}
.ce .pri-num{background:var(--ce);color:#fff}
.re .pri-num{background:var(--re);color:#fff}
.pri-txt{font-size:.72em;line-height:1.3;color:var(--tx)}

.beh-ftr{
  height:.155in;display:flex;align-items:center;padding:0 .065in;
  flex-shrink:0;border-top:1px solid var(--border-dim);
}
.ce .beh-ftr{background:rgba(46,12,0,.65)}
.re .beh-ftr{background:rgba(14,6,32,.65)}
.ftr-bar{flex:1;height:1px}
.ce .ftr-bar{background:linear-gradient(90deg,var(--ce-dk),transparent)}
.re .ftr-bar{background:linear-gradient(90deg,var(--re-dk),transparent)}
.ftr-code{font-family:'Rajdhani',sans-serif;font-size:.60em;font-weight:700;opacity:.4;letter-spacing:.06em;color:var(--tx)}

/* ═══════════════════════════════════════════════════
   PRESSURE CARD FRONT
   ═══════════════════════════════════════════════════ */
.pres{background:var(--card-bg);border:1.5px solid var(--pr-dk)}

.pres-hdr{
  height:.3in;display:flex;align-items:center;padding:0 .065in;gap:4px;
  flex-shrink:0;background:linear-gradient(90deg,#442200,#1c0e00);
  border-bottom:1.5px solid var(--pr);
}
.pres-hdr-lbl{
  font-family:'Rajdhani',sans-serif;font-size:.66em;font-weight:900;
  letter-spacing:.09em;color:#ffbb44;text-transform:uppercase;
}
.pres-hdr-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(255,154,0,.18),transparent)}
.pres-hdr-sym{font-size:.75em;color:var(--pr);opacity:.7;line-height:1}

.pres-art{flex-shrink:0;height:.9in;overflow:hidden}
.pres-art svg{width:100%;height:100%;display:block}

.pres-nm{padding:.04in .09in .025in;border-bottom:1px solid rgba(255,154,0,.12);flex-shrink:0}
.pres-title{
  font-family:'Rajdhani',sans-serif;font-size:.92em;font-weight:900;
  letter-spacing:.04em;color:#fff5e8;text-transform:uppercase;line-height:1.1;
}
.pres-sub{font-size:.66em;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--pr);opacity:.75;margin-top:1px}

.pres-body{flex:1;padding:.05in .09in;font-size:.84em;font-weight:600;line-height:1.34;color:var(--tx);overflow:hidden}

.pres-timing{padding:.01in .09in .035in;display:flex;align-items:center;gap:4px;flex-shrink:0}
.t-pill{
  font-family:'Rajdhani',sans-serif;font-size:.64em;font-weight:900;letter-spacing:.06em;
  color:var(--pr);border:1.5px solid var(--pr-dk);padding:1px 5px;border-radius:2px;
}

.pres-ftr{
  height:.14in;display:flex;align-items:center;padding:0 .065in;
  flex-shrink:0;border-top:1px solid rgba(255,154,0,.07);background:rgba(28,10,0,.6);
}
.pres-ftr-bar{flex:1;height:1px;background:linear-gradient(90deg,var(--pr-dk),transparent)}
.pres-ftr-code{font-family:'Rajdhani',sans-serif;font-size:.60em;font-weight:700;opacity:.4;letter-spacing:.06em;color:var(--tx)}

/* ═══════════════════════════════════════════════════
   CARD BACKS
   ═══════════════════════════════════════════════════ */
.back{background:var(--card-bg);position:relative}
.back-beh{border:1.5px solid #0e2a44}
.back-pres{border:1.5px solid #3a1e00}
.back svg{width:100%;height:100%;display:block}
</style>
</head>
<body>

  <!-- TOAST NOTIFICATION -->
  <div id="toast" class="toast-msg">BALÍČEK BYL ZAMÍCHÁN</div>

  <!-- APP HEADER -->
  <header class="app-header">
    <div class="app-title">PRIORITA: HAGALAZ</div>
    <div class="header-actions">
      <!-- Mute Switch -->
      <button id="btn-sound" class="icon-btn" title="Zvuk zap/vyp">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <path d="M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18,19.86 21,16.28 21,12C21,7.72 18,4.14 14,3.23M16.5,12C16.5,10.23 15.5,8.71 14,7.97V16C15.5,15.29 16.5,13.77 16.5,12M12,4L7,9H3V15H7L12,20V4Z"/>
        </svg>
      </button>
      <!-- Force Reshuffle -->
      <button id="btn-shuffle" class="icon-btn" title="Zamíchat balíček tlaku">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <path d="M14.83,13.41L13.42,14.82L16.59,18H15A3,3 0 0,1 12,15A3,3 0 0,1 9,18H7.41L10.58,14.82L9.17,13.41L5,17.59V20H6.41L12,14.41L17.59,20H19V17.59L14.83,13.41M12,9.59L6.41,4H5V6.41L9.17,10.58L10.58,9.17L7.41,6H9A3,3 0 0,1 12,9A3,3 0 0,1 15,6H16.59L13.42,9.17L14.83,10.58L19,6.41V4H17.59L12,9.59Z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- MAIN APP PANELS -->
  <main class="app-content">

    <!-- TAB 1: PRESSURE CARDS SCREEN -->
    <section id="tab-pressure" class="tab-panel active">
      
      <!-- Progress and stats -->
      <div class="deck-status-bar">

  /* ═══════════════════════════════════════════════════

  function renderBehCard(card, idx) {

  /* ═══════════════════════════════════════════════════
     SYNTHESIZER SOUND ENGINE (Web Audio API)
     ═══════════════════════════════════════════════════ */
  let soundEnabled = true;

  function playBeep(type) {
    if (!soundEnabled) return;
    try {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      const ctx = new AudioContextClass();
      
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      
      osc.connect(gain);
      gain.connect(ctx.destination);
      
      const now = ctx.currentTime;
      
      if (type === 'click') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, now);
        osc.frequency.exponentialRampToValueAtTime(150, now + 0.08);
        gain.gain.setValueAtTime(0.06, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
        osc.start(now);
        osc.stop(now + 0.08);
      } else if (type === 'draw') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(350, now);
        osc.frequency.exponentialRampToValueAtTime(950, now + 0.16);
        gain.gain.setValueAtTime(0.08, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.16);
        osc.start(now);
        osc.stop(now + 0.16);
      } else if (type === 'zoom') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(500, now);
        osc.frequency.exponentialRampToValueAtTime(250, now + 0.22);
        gain.gain.setValueAtTime(0.07, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
        osc.start(now);
        osc.stop(now + 0.22);
      } else if (type === 'shuffle') {
        // Sci-fi sweep / whoosh
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(120, now);
        osc.frequency.exponentialRampToValueAtTime(680, now + 0.35);
        
        // Quick decay filter
        const filter = ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(800, now);
        filter.frequency.exponentialRampToValueAtTime(100, now + 0.35);
        
        osc.disconnect(gain);
        osc.connect(filter);
        filter.connect(gain);
        
        gain.gain.setValueAtTime(0.12, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
        osc.start(now);
        osc.stop(now + 0.35);
      }
    } catch (e) {
      console.warn("AudioContext block or unsupported: ", e);
    }
  }

  /* ═══════════════════════════════════════════════════
     STATE MANAGEMENT & GAME LOOP
     ═══════════════════════════════════════════════════ */
  const state = {
    // Deck contains indices of PRESSURE_CARDS (0 to 25)
    deck: [],
    discard: [],
    history: [],
    currentCardIdx: null, // null means face down
  };

  // Helper: Shuffle Array (Fisher-Yates)
  function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
  }

  // Reshuffle the Deck
  function initDeck(silent = false) {
    state.deck = [];
    state.discard = [];
    for (let i = 0; i < PRESSURE_CARDS.length; i++) {
      state.deck.push(i);
    }
    shuffleArray(state.deck);
    state.currentCardIdx = null;
    
    updateDeckUI();
    renderPressureCardSlot();
    
    if (!silent) {
      showToast("BALÍČEK BYL ZAMÍCHÁN");
      playBeep('shuffle');
      
      const cardEl = document.querySelector('#pressure-card-slot .card');
      if (cardEl) {
        cardEl.classList.remove('drawing');
        void cardEl.offsetWidth;
        cardEl.classList.add('drawing');
      }
    }
  }

  // Draw a single card from deck
  function drawCard() {
    // If deck is empty, automatically reshuffle
    if (state.deck.length === 0) {
      initDeck();
    }
    
    const drawnIdx = state.deck.pop();
    state.currentCardIdx = drawnIdx;
    state.discard.push(drawnIdx);
    
    // Push to history (up to 8 items, unique)
    state.history.unshift(drawnIdx);
    if (state.history.length > 8) {
      state.history.pop();
    }
    
    playBeep('draw');
    
    updateDeckUI();
    renderPressureCardSlot();
    updateHistoryUI();

    // Trigger CSS animation by toggling class on card
    const cardEl = document.querySelector('#pressure-card-slot .card');
    if (cardEl) {
      cardEl.classList.remove('drawing');
      void cardEl.offsetWidth; // Force reflow
      cardEl.classList.add('drawing');
    }
  }

  // Show visual toast notification
  let toastTimer = null;
  function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('active');
    
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => {
      toast.classList.remove('active');
    }, 2000);
  }

  // Render the current card slot (either back of card, or face up pressure card)
  function renderPressureCardSlot() {
    const slot = document.getElementById('pressure-card-slot');
    if (state.currentCardIdx === null) {
      slot.innerHTML = renderPresBack(99);
    } else {
      const card = PRESSURE_CARDS[state.currentCardIdx];
      slot.innerHTML = renderPresCard(card, state.currentCardIdx);
    }
  }

  // Update deck counters and progress bars
  function updateDeckUI() {
    const total = PRESSURE_CARDS.length;
    const remaining = state.deck.length;
    
    document.getElementById('deck-progress-lbl').textContent = `ZBÝVÁ ${remaining} / ${total} KARET`;
    
    const fillPercent = (remaining / total) * 100;
    document.getElementById('deck-progress-fill').style.width = `${fillPercent}%`;
  }

  // Update History panel at bottom of Draw Tab
  function updateHistoryUI() {
    const list = document.getElementById('history-list');
    if (state.history.length === 0) {
      list.innerHTML = `<div style="font-size:0.75rem; color:var(--tx-dm); font-style:italic;">Žádné tažené karty</div>`;
      return;
    }
    
    list.innerHTML = state.history.map((idx, hPos) => {
      const card = PRESSURE_CARDS[idx];
      return `<div class="history-item" data-idx="${idx}">${card.name}</div>`;
    }).join('');
    
    // Add click listeners to history items
    list.querySelectorAll('.history-item').forEach(item => {
      item.addEventListener('click', (e) => {
        const cardIndex = parseInt(e.currentTarget.getAttribute('data-idx'));
        openZoomOverlay(PRESSURE_CARDS[cardIndex], 'pres', cardIndex);
      });
    });
  }

  /* ═══════════════════════════════════════════════════
     TAB 2: GRID SYSTEM & DYNAMIC RESIZER
     ═══════════════════════════════════════════════════ */
  function buildBehaviorsGrid() {
    const grid = document.getElementById('behaviors-grid');
    grid.innerHTML = BEHAVIOR_CARDS.map((card, i) => `
      <div class="grid-item" data-id="${card.id}" data-index="${i}">
        <div class="card-scale-wrapper">
          ${renderBehCard(card, i)}
        </div>
      </div>
    `).join('');
    
    // Attach click listeners to grid items
    grid.querySelectorAll('.grid-item').forEach(item => {
      item.addEventListener('click', (e) => {
        const idx = parseInt(e.currentTarget.getAttribute('data-index'));
        openZoomOverlay(BEHAVIOR_CARDS[idx], 'beh', idx);
      });
    });
    
    // Trigger grid sizing computation
    resizeGrid();
  }

  // Resizes card wrappers in grid dynamically to maintain columns with zero gaps
  function resizeGrid() {
    const items = document.querySelectorAll('.grid-item');
    if (items.length === 0) return;
    
    // Get client width of the first cell
    const cellW = items[0].getBoundingClientRect().width;
    
    // Base card is 240px wide by 336px high
    const baseW = 240;
    const baseH = 336;
    
    // Scale factor to fit cell width perfectly
    const scale = cellW / baseW;
    const targetHeight = baseH * scale;
    
    items.forEach(item => {
      // Set the height of cell to match scaled card height
      item.style.height = `${targetHeight}px`;
      
      const wrapper = item.querySelector('.card-scale-wrapper');
      if (wrapper) {
        wrapper.style.transform = `scale(${scale})`;
      }
    });
  }

  // Scale calculations for the Pressure card in Tab 1
  function resizePressureCard() {
    const container = document.querySelector('.pressure-card-area');
    if (!container) return;
    
    const containerW = container.clientWidth;
    const containerH = container.clientHeight;
    
    const baseW = 240;
    const baseH = 336;
    
    const scaleW = containerW * 0.95 / baseW;
    const scaleH = containerH * 0.95 / baseH;
    const scale = Math.min(scaleW, scaleH, 1.25); // Cap at 1.25x size
    
    const wrapper = document.getElementById('pressure-card-slot');
    if (wrapper) {
      wrapper.style.transform = `scale(${scale})`;
    }
  }

  // Adjusts the entire screen resize logic
  function resizeAll() {
    resizeGrid();
    resizePressureCard();
  }

  /* ═══════════════════════════════════════════════════
     ZOOM OVERLAY CONTROL & EVENT BINDINGS
     ═══════════════════════════════════════════════════ */
  function openZoomOverlay(cardData, cardType, idx) {
    const overlay = document.getElementById('zoom-overlay');
    const holder = document.getElementById('zoom-card-holder');
    
    // Generate card layout HTML
    let cardHtml = '';
    if (cardType === 'beh') {
      cardHtml = renderBehCard(cardData, idx);
    } else {
      cardHtml = renderPresCard(cardData, idx);
    }
    
    holder.innerHTML = cardHtml;
    playBeep('zoom');
    overlay.classList.add('active');
    
    // Dynamically calculate zoom scale to fit viewport
    const vh = window.innerHeight;
    const vw = window.innerWidth;
    
    const baseW = 240;
    const baseH = 336;
    
    // Leave 20% margin for close buttons and safety zones
    const maxW = vw * 0.88;
    const maxH = vh * 0.72;
    
    const scaleW = maxW / baseW;
    const scaleH = maxH / baseH;
    const scale = Math.min(scaleW, scaleH, 1.6); // max scale 1.6x
    
    holder.style.setProperty('--zoom-scale', scale);
    
    // Set actual container size to match zoomed wrapper
    holder.style.width = `${baseW * scale}px`;
    holder.style.height = `${baseH * scale}px`;
  }

  function closeZoomOverlay() {
    const overlay = document.getElementById('zoom-overlay');
    if (overlay.classList.contains('active')) {
      playBeep('click');
      overlay.classList.remove('active');
    }
  }

  /* ═══════════════════════════════════════════════════
     INITIALIZATION & EVENTS
     ═══════════════════════════════════════════════════ */
  document.addEventListener('DOMContentLoaded', () => {
    
    // 1. Initialize data & deck
    initDeck(true);
    buildBehaviorsGrid();
    
    // 2. Click tab switching
    const tabs = document.querySelectorAll('.nav-tab');
    tabs.forEach(tab => {
      tab.addEventListener('click', (e) => {
        const btn = e.currentTarget;
        if (btn.classList.contains('active')) return;
        
        playBeep('click');
        
        tabs.forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        
        const target = btn.getAttribute('data-target');
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        
        if (target === 'pressure') {
          document.getElementById('tab-pressure').classList.add('active');
          resizePressureCard();
        } else {
          document.getElementById('tab-enemies').classList.add('active');
          // Wait briefly for CSS paint before grid sizing
          setTimeout(resizeGrid, 30);
        }
      });
    });

    // 3. Draw cards button
    document.getElementById('btn-draw').addEventListener('click', () => {
      drawCard();
    });

    // 4. Reshuffle button
    document.getElementById('btn-shuffle').addEventListener('click', () => {
      initDeck();
    });

    // 5. Sound Mute Toggle
    const soundBtn = document.getElementById('btn-sound');
    soundBtn.addEventListener('click', () => {
      soundEnabled = !soundEnabled;
      if (soundEnabled) {
        soundBtn.classList.remove('muted');
        soundBtn.innerHTML = `
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
            <path d="M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18,19.86 21,16.28 21,12C21,7.72 18,4.14 14,3.23M16.5,12C16.5,10.23 15.5,8.71 14,7.97V16C15.5,15.29 16.5,13.77 16.5,12M12,4L7,9H3V15H7L12,20V4Z"/>
          </svg>`;
        playBeep('click');
      } else {
        soundBtn.classList.add('muted');
        soundBtn.innerHTML = `
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
            <path d="M12,4L9.91,6.09L12,8.18M4.27,3L3,4.27L7.73,9H3V15H7L12,20V13.27L16.25,17.53C15.58,18.04 14.83,18.46 14,18.7V20.76C15.38,20.45 16.63,19.78 17.68,18.9L20.73,21.95L22,20.68L4.27,3M12,5.83V9.27L14.39,11.66C14.78,10.87 15,10 15,9A5,5 0 0,0 10,4V5.83M19,9C19,10.9 18.23,12.63 17,13.9L18.42,15.32C20.04,13.7 21,11.47 21,9A9,9 0 0,0 12,0V2.06C15.89,2.37 19,5.33 19,9Z"/>
          </svg>`;
      }
    });

    // 6. Close Zoom Overlay
    document.getElementById('btn-close-zoom').addEventListener('click', closeZoomOverlay);
    document.getElementById('zoom-overlay').addEventListener('click', (e) => {
      // Close only if clicking overlay background directly
      if (e.target.id === 'zoom-overlay') {
        closeZoomOverlay();
      }
    });

    // 7. Window resize handling
    window.addEventListener('resize', resizeAll);
    
    // 8. Run initial resize
    setTimeout(resizeAll, 100);
  });
  </script>
</body>
</html>
